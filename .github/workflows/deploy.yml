name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🚀 Starting deployment..."

            cd /home/ubuntu/bfsi-agents

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📦 Installing Intake Agent dependencies..."
            cd agents/intake_agent
            /home/ubuntu/.local/bin/poetry install --no-interaction --no-root

            echo "📦 Installing KYC Agent dependencies..."
            cd ../kyc_agent
            /home/ubuntu/.local/bin/poetry install --no-interaction --no-root

            echo "🔄 Restarting services..."
            sudo systemctl restart intake-agent
            sudo systemctl restart kyc-agent

            echo "✅ Deployment completed successfully!"
