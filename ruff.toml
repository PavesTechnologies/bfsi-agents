# Project Settings
target-version = "py311"
line-length = 88

# 🎯 ONLY lint files inside 'src' directories
include = ["agents/**/src/**/*.py"]

# 🚫 Explicitly ignore everything else to be safe
extend-exclude = [
    "**/alembic",
    "**/tests",
    "**/migrations",
    "venv",
    ".git",
]

[lint]
# Enable standard rule sets for the "Canonical Agent Structure"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes (logic/import errors)
    "I",   # isort (auto-sort imports)
    "B",   # flake8-bugbear (common bugs)
    "UP",  # pyupgrade (3.11+ syntax)
]

ignore = ["B008"]

[lint.extend-per-file-ignores]
# Ignore line length only for validation logic where long strings are common
"**/utils/validation/*.py" = ["E501"]

# Globally ignore the FastAPI Depends() warning

[format]
# Standardize formatting for the internal agent layers
quote-style = "double"
indent-style = "space"
