[tool.poetry]
name = "kyc-agent"
version = "0.1.0"
description = "kyc_agent microservice"
authors = ["Agentic Platform Team"]

[[tool.poetry.packages]]
include = "src"

[tool.poetry.dependencies]
python = "^3.11"
alembic = "^1.18.4"
fastapi = "^0.110.0"
langgraph = "^0.0.40"
opentelemetry-api = "^1.39.1"
opentelemetry-exporter-otlp = "^1.39.1"
opentelemetry-exporter-otlp-proto-grpc = "^1.39.1"
opentelemetry-instrumentation-fastapi = "^0.60b1"
opentelemetry-sdk = "^1.39.1"
pydantic = {extras = ["email"], version = "^2.12.5"}
pydantic-settings = "^2.12.0"
redis = "^7.1.1"
slowapi = "^0.1.9"
sqlacodegen = "^3.2.0"
sqlalchemy = "^2.0.46"
uvicorn = "^0.29.0"
asyncpg = "^0.31.0"
psycopg2-binary = "^2.9.11"


[tool.poetry.scripts]
dev = "src.cli:dev"
prod = "src.cli:prod"
test = "src.cli:test"
migration = "src.cli:migration"
initial_migration = "src.cli:migrate"
down_grade = "src.cli:downgrade"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0.0"
ruff = "^0.3.0"
fakeredis = "^2.33.0"
pytest-asyncio = "^1.3.0"
httpx = "^0.28.1"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"